packages:
  - packages/*
  - packages/components/*
  - packages/templates/*
  - packages/tools/*
  - packages/utils/*
  - packages/builder/*

allowBuilds:
  esbuild: true
  unrs-resolver: true

onlyBuiltDependencies:
  - esbuild

updateConfig:
  ignoreDependencies:
    - "@types/node"
    - esbuild
    - ora
    - chalk
    - eslint
    - chai
    - mime
