name: Set LFS Cache
description: 配置 Git 并启用 LFS 缓存

runs:
  using: "composite"
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config --global lfs.storage "$HOME/.cache/git-lfs"
        git lfs install --local

    - name: Cache Git LFS
      uses: actions/cache@v4
      with:
        path: $HOME/.cache/git-lfs
        key: ${{ runner.os }}-git-lfs-${{ hashFiles('.gitattributes') }}
        restore-keys: ${{ runner.os }}-git-lfs-

    - name: Fetch and Checkout LFS
      shell: bash
      run: git lfs pull
